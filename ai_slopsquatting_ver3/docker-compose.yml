version: '3.8'

services:

  # ── Python 분석 API (실시간 탐지 서버) ─────────────────────
  slop-api:
    build:
      context: ./secure_capstone        # source_analyzer.py 포함을 위해 상위로
      dockerfile: api/Dockerfile        # Dockerfile은 api/ 안에 있음
    container_name: slop_analysis_api
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - ./secure_capstone/api:/app/api                        # api 소스 핫리로드
      - ./secure_capstone/source_analyzer.py:/app/source_analyzer.py  # 공용 모듈
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

