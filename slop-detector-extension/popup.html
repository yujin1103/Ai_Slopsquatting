<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #fff;
    }
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #f1f5f9;
    }
    .header-title { font-weight: 700; font-size: 15px; letter-spacing: -.2px; }
    .header-sub   { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .status {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-bottom: 1px solid #f1f5f9;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; flex-shrink:0; }
    .dot.ok    { background: #22c55e; }
    .dot.error { background: #ef4444; }
    .status-text { font-size: 12px; color: #475569; }
    .sites {
      padding: 10px 16px;
      border-bottom: 1px solid #f1f5f9;
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .site-pill {
      font-size: 11px; padding: 2px 8px;
      border-radius: 99px; border: 1px solid #e2e8f0;
      color: #64748b; background: #f8fafc;
    }
    .footer {
      padding: 10px 16px;
      font-size: 11px; color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">🛡 Slop Detector</div>
    <div class="header-sub">AI 추천 패키지 악성 탐지</div>
  </div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <div class="status-text" id="status-text">서버 확인 중...</div>
  </div>
  <div class="sites">
    <span class="site-pill">claude.ai</span>
    <span class="site-pill">chatgpt.com</span>
    <span class="site-pill">gemini.google.com</span>
  </div>
  <div class="footer">localhost:8001 · Docker 필요</div>
  <script src="popup.js"></script>
</body>
</html>
