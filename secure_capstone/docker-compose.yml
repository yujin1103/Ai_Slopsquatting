version: '3.8'

services:

  # ── n8n 워크플로우 엔진 ──────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n
    user: root
    container_name: n8n_slop_detector
    restart: always
    ports:
      - "5679:5678"            # 기존 컨테이너(5678)과 포트 충돌 방지
    environment:
      - N8N_HOST=0.0.0.0
      - WEBHOOK_URL=http://localhost:5679/
      - TZ=Asia/Seoul
      - GENERIC_TIMEZONE=Asia/Seoul
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_BLOCK_FS_WRITE_ACCESS=false
      - N8N_RESTRICT_FILE_ACCESS_TO=/capstone_data
      - N8N_FILE_ACCESS_WHITELIST=/capstone_data
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_SAVE_ON_PROGRESS=false
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=false
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - NODE_FUNCTION_ALLOW_BUILTIN=*
    volumes:
      - n8n_slop_data:/root/.n8n
      - ./data:/capstone_data
      - ./reports:/capstone_data/reports
    depends_on:
      - slop-api

  # ── Python 분석 API ─────────────────────────────────────
  slop-api:
    build: ./api
    container_name: slop_analysis_api
    restart: always
    ports:
      - "8001:8001"            # 기존 deepfake-api(8000)와 포트 충돌 방지
    volumes:
      - ./api:/app

volumes:
  n8n_slop_data: {}
